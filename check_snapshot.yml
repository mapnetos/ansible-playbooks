---
- name: Generate VMware Snapshots HTML Report and Send Email
  collections:
    - community.vmware
  hosts: localhost
  gather_facts: true
  vars:
    vmware_datacenter: {{ datacenter }}
    
    # Email settings (no authentication)
    smtp_host: "your-smtp-server"
    smtp_port: 25
    email_from: "ansible@yourdomain.com"
    email_to: ["recipient1@domain.com", "recipient2@domain.com"]
    email_subject: "VMware Snapshots Report"
    
    # Report settings
    report_path: "/tmp/vmware_snapshots_report.html"

  tasks:
    - name: Gather all VMware snapshots information
      community.vmware.vmware_all_snapshots_info:
        hostname: "{{ vmware_hostname }}"
        username: "{{ vmware_username }}"
        password: "{{ vmware_password }}"
        validate_certs: false
        datacenter: "{{ vmware_datacenter }}"
      delegate_to: localhost
      register: snapshots_result

    - name: Extract snapshot data into list
      set_fact:
        snapshots_list: >-
          {{
            snapshots_result.snapshots_info.values()
            | list
            | sum(start=[])
            | map(attribute='snapshots')
            | list
            | sum(start=[])
          }}
      delegate_to: localhost

    - name: Create filtered snapshots list with required fields
      set_fact:
        report_snapshots: >-
          {{
            snapshots_list
            | map(
                lambda s: {
                  'vm_name': s.vm_name,
                  'created_at': s.creation_time,
                  'size': s.size_gb
                }
              )
            | list
          }}
      delegate_to: localhost

    - name: Generate HTML report using Jinja2 template
      template:
        src: snapshots_report.j2
        dest: "{{ report_path }}"
      delegate_to: localhost
      run_once: true

    - name: Send HTML report via email
      community.general.mail:
        host: "{{ smtp_host }}"
        port: "{{ smtp_port }}"
        from: "{{ email_from }}"
        to: "{{ email_to }}"
        subject: "{{ email_subject }}"
        subtype: html
        body: |
          <html>
          <body>
          <h2>VMware Snapshots Report</h2>
          <p>Please find the snapshots report below:</p>
          {% include report_path %}
          </body>
          </html>
      delegate_to: localhost
      run_once: true
