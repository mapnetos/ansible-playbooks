---
- name: Generate VMware Snapshots HTML Report and Send Email
  collections:
    - community.vmware
  hosts: localhost
  gather_facts: true
  vars:
    vmware_datacenter: "{{ datacenter }}"
    smtp_host: "your-smtp-server"
    smtp_port: 25
    email_from: "ansible@yourdomain.com"
    email_to: ["recipient@domain.com"]
    email_subject: "VMware Snapshots Report"
    report_path: "/tmp/vmware_snapshots_report.html"

  tasks:
    - name: Gather VMware snapshots
      community.vmware.vmware_all_snapshots_info:
        validate_certs: false
        datacenter: "{{ vmware_datacenter }}"
      register: result

      delegate_to: localhost
      register: snapshots_result

    - name: Debug result to see actual structure
      debug:
        msg: "{{ snapshots_result }}"
      delegate_to: localhost

    - name: Extract all snapshots from datacenter structure
      set_fact:
        all_vm_snapshots: >-
          {{
            snapshots_result
            | json_query('snapshots_info.*.snapshots[*]')
            | list
            | sum(start=[])
            | sum(start=[])
          }}
      delegate_to: localhost
      no_log: false

    - name: Alternative extraction - flatten dict structure
      set_fact:
        flat_snapshots: >-
          {{
            snapshots_result.snapshots_info
            | dict
            | items
            | map(attribute='1')
            | list
            | map(attribute='snapshots')
            | list
            | sum(start=[])
          }}
      delegate_to: localhost
      when: snapshots_result.snapshots_info is defined

    - name: Create report snapshots list
      set_fact:
        report_snapshots: >-
          {{
            flat_snapshots
            | map(
                lambda s: {
                  'vm_name': s.vm_name,
                  'created_at': s.creation_time,
                  'size': s.size_gb
                }
              )
            | list
          }}
      delegate_to: localhost
      when: flat_snapshots is defined

    - name: Generate HTML report
      template:
        src: snapshots_report.j2
        dest: "{{ report_path }}"
      delegate_to: localhost
      run_once: true

    - name: Send email with HTML report
      community.general.mail:
        host: "{{ smtp_host }}"
        port: "{{ smtp_port }}"
        from: "{{ email_from }}"
        to: "{{ email_to }}"
        subject: "{{ email_subject }}"
        subtype: html
        body: "<html><body><h2>VMware Snapshots Report</h2><table border='1'><tr><th>VM Name</th><th>Created At</th><th>Size (GB)</th></tr>{% for s in report_snapshots %}<tr><td>{{ s.vm_name }}</td><td>{{ s.created_at }}</td><td>{{ s.size }}</td></tr>{% endfor %}</table></body></html>"
      delegate_to: localhost
      run_once: true
