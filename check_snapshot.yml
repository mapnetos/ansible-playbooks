---
- name: Generate VMware Snapshots HTML Report and Send Email
  collections:
    - community.vmware
  hosts: localhost
  gather_facts: true
  vars:
    vmware_datacenter: "{{ datacenter }}"
    smtp_host: "your-smtp-server"
    smtp_port: 25
    email_from: "ansible@yourdomain.com"
    email_to: ["recipient@domain.com"]
    email_subject: "VMware Snapshots Report"
    report_path: "/tmp/vmware_snapshots_report.html"

  tasks:
    - name: Gather VMware snapshots
      community.vmware.vmware_all_snapshots_info:
        validate_certs: false
        datacenter: "{{ vmware_datacenter }}"
      register: result

    - name: Build snapshots list using loop
      set_fact:
        report_snapshots: []
      loop: "{{ result.snapshots_info.keys() | list }}"
      loop_control:
        loop_var: dc_name
      register: loop_result

    - name: Extract snapshots with proper flattening
      set_fact:
        report_snapshots: >-
          {{
            []
            + result.snapshots_info
            | dict
            | items
            | map(attribute='1.snapshots')
            | list
            | sum(start=[])
            | map(lambda s: {'vm_name': s.vm_name, 'created_at': s.creation_time, 'size': s.size_gb})
            | list
          }}

    - name: Generate HTML report
      template:
        src: snapshots_report.j2
        dest: "{{ report_path }}"
      run_once: true

    - name: Send email
      community.general.mail:
        host: "{{ smtp_host }}"
        port: "{{ smtp_port }}"
        from: "{{ email_from }}"
        to: "{{ email_to }}"
        subject: "{{ email_subject }}"
        subtype: html
        body: "<html><body><h1>VMware Snapshots</h1><table border='1'><tr><th>VM Name</th><th>Created</th><th>Size GB</th></tr>{% for s in report_snapshots %}<tr><td>{{ s.vm_name }}</td><td>{{ s.created_at }}</td><td>{{ s.size }}</td></tr>{% endfor %}</table></body></html>"
      run_once: true
