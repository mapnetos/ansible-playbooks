---
- name: Generate VMware Snapshots HTML Report and Send Email
  hosts: localhost
  gather_facts: false
  vars:
    vmware_datacenter: "{{ datacenter }}"
    smtp_host: "your-smtp-server"
    smtp_port: 25
    email_from: "ansible@yourdomain.com"
    email_to: ["recipient@domain.com"]
    email_subject: "VMware Snapshots Report"
    report_path: "/tmp/vmware_snapshots_report.html"

  tasks:
    - name: Gather VMware snapshots information
      community.vmware.vmware_all_snapshots_info:
        validate_certs: false
        datacenter: "{{ vmware_datacenter }}"
      delegate_to: localhost
      register: result

    - name: Debug - show full result structure
      debug:
        var: result
      delegate_to: localhost

    - name: Debug - show keys of result
      debug:
        var: result.keys()
      delegate_to: localhost

    - name: Extract snapshots using json_query
      set_fact:
        raw_snapshots: "{{ result | json_query('vmware_all_snapshots_info[]') }}"
      delegate_to: localhost
      when: result.vmware_all_snapshots_info is defined

    - name: Alternative - extract from nested structure
      set_fact:
        raw_snapshots: >-
          {{
            result
            | dict
            | items
            | selectattr('0', 'ne', 'failed')
            | selectattr('0', 'ne', 'skipped')
            | map(attribute='1')
            | list
            | sum(start=[])
          }}
      delegate_to: localhost
      when: result.vmware_all_snapshots_info is not defined

    - name: Debug - show raw snapshots
      debug:
        var: raw_snapshots
      delegate_to: localhost

    - name: Create report snapshots list
      set_fact:
        report_snapshots: >-
          {{
            raw_snapshots
            | map(
                lambda s: {
                  'vm_name': s.vm_name | default('unknown'),
                  'created_at': s.creation_time | default('unknown'),
                  'size': s.size_gb | default(0)
                }
              )
            | list
          }}
      delegate_to: localhost

    - name: Debug - show final report data
      debug:
        var: report_snapshots
      delegate_to: localhost

    - name: Generate HTML report
      template:
        src: snapshots_report.j2
        dest: "{{ report_path }}"
      delegate_to: localhost
      run_once: true

    - name: Send email with HTML report
      community.general.mail:
        host: "{{ smtp_host }}"
        port: "{{ smtp_port }}"
        from: "{{ email_from }}"
        to: "{{ email_to }}"
        subject: "{{ email_subject }}"
        subtype: html
        body: |
          <html>
          <body>
          <h1>VMware Snapshots Report</h1>
          <table border="1" cellpadding="5">
          <tr><th>VM Name</th><th>Created At</th><th>Size (GB)</th></tr>
          {% for snapshot in report_snapshots %}
          <tr><td>{{ snapshot.vm_name }}</td><td>{{ snapshot.created_at }}</td><td>{{ snapshot.size }}</td></tr>
          {% endfor %}
          </table>
          <p>Total: {{ report_snapshots | length }} snapshots</p>
          </body>
          </html>
      delegate_to: localhost
      run_once: true
