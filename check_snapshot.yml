---
- name: Get VMware Snapshots and Send Email
  hosts: localhost
  gather_facts: false
  vars:  
    # Email settings (no authentication)
    smtp_server: "your-smtp-server"
    smtp_port: 25
    email_from: "ansible@yourdomain.com"
    email_to: "recipient@domain.com"
    email_subject: "VMware Snapshots Report"
    
    # Report file
    report_file: "/tmp/snapshots.html"

  tasks:
    - name: Gather all VMware snapshots
      community.vmware.vmware_all_snapshots_info:
        datacenter: "{{ datacenter }}"
        validate_certs: false
      register: snapshots_result

    - name: Show snapshots found
      debug:
        msg: "Found {{ snapshots_result.vmware_all_snapshots_info | length }} snapshots"

    - name: Send email with snapshots list
      community.general.mail:
        host: "{{ smtp_server }}"
        port: "{{ smtp_port }}"
        from: "{{ email_from }}"
        to: "{{ email_to }}"
        subject: "{{ email_subject }}"
        subtype: html
        body: |
          <html>
          <body>
          <h2>VMware Snapshots Report</h2>
          <p>Total snapshots: {{ snapshots_result.vmware_all_snapshots_info | length }}</p>
          <table border="1" cellpadding="5">
          <tr><th>VM Name</th><th>Snapshot Name</th><th>Description</th><th>Created</th><th>Size (GB)</th></tr>
          {% for snap in snapshots_result.vmware_all_snapshots_info %}
          <tr>
            <td>{{ snap.vm_name }}</td>
            <td>{{ snap.snapshot_name }}</td>
            <td>{{ snap.description }}</td>
            <td>{{ snap.creation_time }}</td>
            <td>{{ snap.size_gb }}</td>
          </tr>
          {% endfor %}
          </table>
          </body>
          </html>
