---
- name: Report all VMware VM snapshots
  hosts: localhost
  gather_facts: false
  vars:
    threshold_days: "{{ days_threshold | default(30) | int }}"
  collections:
    - community.vmware
    - community.general

  tasks:

    - name: Gather all snapshot information across the datacenter
      community.vmware.vmware_all_snapshots_info:
        datacenter: "{{ datacenter }}"
        validate_certs: false
      register: snapshots_info
    - name: Calculate threshold timestamp
      ansible.builtin.set_fact:
        threshold_epoch: "{{ (now().timestamp() | int) - (threshold_days * 86400) }}"


    - name: Gather all snapshot information
      community.vmware.vmware_all_snapshots_info:
        datacenter: "{{ datacenter }}"
        validate_certs: false
      register: snapshots_info

    - name: Initialize filtered snapshot list
      ansible.builtin.set_fact:
        filtered_snapshots: []

    - name: Add snapshots older than threshold
      ansible.builtin.set_fact:
        filtered_snapshots: "{{ filtered_snapshots + [item] }}"
      loop: "{{ snapshots_info.vmware_all_snapshots_info | default([]) }}"
      when:
        - item.creation_time is defined
        - ( item.creation_time | to_datetime('%Y-%m-%dT%H:%M:%S.%f%z')).strftime('%s') | int < threshold_epoch

    - name: Generate HTML table rows
      ansible.builtin.set_fact:
        html_table_rows: |
          {% if filtered_snapshots | length > 0 %}
          {% for snapshot in filtered_snapshots %}
          <tr>
            <td>{{ snapshot.name }}</td>
            <td>{{ snapshot.vm_name }}</td>
            <td>{{ snapshot.creation_time }}</td>
            <td>N/A</td>
          </tr>
          {% endfor %}
          {% else %}
          <tr>
            <td colspan="4">
              No snapshots older than {{ threshold_days }} days were found.
            </td>
          </tr>
          {% endif %}

    - name: Build HTML email body
      ansible.builtin.set_fact:
        email_body_html: |
          <html>
          <head>
            <style>
              body {
                font-family: Arial, sans-serif;
              }

              table {
                width: 100%;
                border-collapse: collapse;
              }

              th, td {
                border: 1px solid #cccccc;
                padding: 8px;
                text-align: left;
              }

              th {
                background-color: #f2f2f2;
              }

              .note {
                color: #800000;
                font-weight: bold;
              }
            </style>
          </head>
          <body>

            <h2>{{ email_subject }}</h2>

            <p>
              This report lists VMware snapshots in datacenter
              <strong>{{ datacenter }}</strong>
              that are older than
              <strong>{{ threshold_days }}</strong> days.
            </p>

            <p>
              Threshold date:
              <strong>{{ readable_threshold_date }}</strong>
            </p>

            <table>
              <thead>
                <tr>
                  <th>Snapshot Name</th>
                  <th>VM Name</th>
                  <th>Created</th>
                  <th>Size</th>
                </tr>
              </thead>
              <tbody>
                {{ html_table_rows }}
              </tbody>
            </table>

            <p class="note">Note:</p>

            <p>
              The VMware module
              <code>vmware_all_snapshots_info</code>
              does not provide the actual snapshot size.
            </p>

            <p>
              Report generated automatically by Ansible.
            </p>

          </body>
          </html>

    - name: Send HTML email report
      community.general.mail:
        host: "{{ smtp_server }}"
        port: "{{ smtp_port | default(25) }}"
        from: "{{ email_from }}"
        to: "{{ email_to }}"
        subject: "{{ email_subject }}"
        body: "{{ email_body_html }}"
        subtype: html
        secure: never
      delegate_to: localhost

    - name: Display result
      ansible.builtin.debug:
        msg: >-
          Found {{ filtered_snapshots | length }}
          snapshots older than {{ threshold_days }} days.
