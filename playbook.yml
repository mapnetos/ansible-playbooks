---
- name: Report all VMware VM snapshots
  hosts: localhost
  gather_facts: false
  vars:
    threshold_days: "{{ days_threshold | default(30) | int }}"
    # Ensure variables like datacenter, smtp_server, etc., are defined or passed via extra-vars
  collections:
    - community.vmware
    - community.general

  tasks:
    - name: Gather all snapshot information across the datacenter
      community.vmware.vmware_all_snapshots_info: # Changed to more specific module if applicable, or kept as is
        datacenter: "{{ datacenter }}"
        validate_certs: false
      register: snapshots_info
