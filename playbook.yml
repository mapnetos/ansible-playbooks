---
- name: Report all VMware VM snapshots
  hosts: localhost
  gather_facts: false
  vars:
    threshold_days: "{{ days_threshold | default(30) | int }}"
    # Ensure variables like datacenter, smtp_server, etc., are defined or passed via extra-vars
  collections:
    - community.vmware
    - community.general

  tasks:
    - name: Gather all snapshot information across the datacenter
      community.vmware.vmware_all_snapshots_info: # Changed to more specific module if applicable, or kept as is
        datacenter: "{{ datacenter }}"
        validate_certs: false
      register: snapshots_info

    - name: Calculate threshold timestamp
      ansible.builtin.set_fact:
        threshold_epoch: "{{ (ansible_date_time.epoch | int) - (threshold_days | int * 86400) }}"
        readable_threshold_date: "{{ (ansible_date_time.epoch | int - (threshold_days | int * 86400)) | strftime('%Y-%m-%d') }}"

    - name: Initialize and filter snapshot list
      ansible.builtin.set_fact:

        filtered_snapshots: "{{ (snapshots_info.snapshots | default([])) | selectattr('creation_time', 'defined') | selectattr('creation_time', 'to_datetime', '%Y-%m-%dT%H:%M:%S.%f%z') | map('extract', item, 'creation_time') | list }}"
        # Note: The logic below is more efficient than a loop for complex filtering
      # Simplified approach:
    
    - name: Filter snapshots older than threshold
      ansible.builtin.set_fact:
        filtered_snapshots: "{{ snapshots_info.snapshots | default([]) | selectattr('creation_time', 'defined') | select('compare_snapshot_date', threshold_epoch) | list }}"
      vars:
        # Use a filter plugin logic or simple Jinja loop to filter
        filtered_list: >-
          {% set results = [] %}
          {% for snap in snapshots_info.snapshots %}
            {% if (snap.creation_time | to_datetime('%Y-%m-%dT%H:%M:%S.%f%z')).strftime('%s') | int < threshold_epoch | int %}
              {% set _ = results.append(snap) %}
            {% endif %}
          {% endfor %}
          {{ results }}

    - name: Generate HTML table rows
      ansible.builtin.set_fact:
        html_table_rows: |
          {% if filtered_list | length > 0 %}
            <table border="1">
            <tr><th>Snapshot Name</th><th>VM Name</th><th>Created</th></tr>
            {% for snapshot in filtered_list %}
              <tr>
                <td>{{ snapshot.name }}</td>
                <td>{{ snapshot.vm_name }}</td>
                <td>{{ snapshot.creation_time }}</td>
              </tr>
            {% endfor %}
            </table>
          {% else %}
            <p>No snapshots older than {{ threshold_days }} days were found.</p>
          {% endif %}

    - name: Build HTML email body
      ansible.builtin.set_fact:
        email_body_html: |
          <html><body>
          <h2>VMware Snapshot Report</h2>
          <p>This report lists VMware snapshots in datacenter {{ datacenter }} that are older than {{ threshold_days }} days.</p>
          <p>Threshold date: {{ readable_threshold_date }}</p>
          {{ html_table_rows }}
          <p>Note: The VMware module does not provide the actual snapshot size.</p>
          <p>Report generated automatically by Ansible.</p>
          </body></html>

    - name: Send HTML email report
      community.general.mail:
        host: "{{ smtp_server }}"
        port: "{{ smtp_port | default(25) }}"
        from: "{{ email_from }}"
        to: "{{ email_to }}"
        subject: "{{ email_subject | default('VMware Snapshot Report') }}"
        body: "{{ email_body_html }}"
        subtype: html
        secure: never
      delegate_to: localhost
      when: filtered_list | length > 0

    - name: Display result
      ansible.builtin.debug:
        msg: "Found {{ filtered_list | length }} snapshots older than {{ threshold_days }} days."
