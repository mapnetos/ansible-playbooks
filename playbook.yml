---
- name: Report all VMware VM snapshots
  hosts: localhost
  gather_facts: false

  collections:
    - community.vmware
    - community.general

  tasks:

    - name: Set threshold date
      ansible.builtin.set_fact:
        threshold_epoch: "{{ (now().timestamp() | int) - ((days_threshold | int) * 86400) }}"
        readable_threshold_date: >-
          {{
            (
              (now().timestamp() | int)
              - ((days_threshold | int) * 86400)
            ) | strftime('%Y-%m-%d %H:%M:%S')
          }}

    - name: Gather all snapshot information across the datacenter
      community.vmware.vmware_all_snapshots_info:
        datacenter: "{{ datacenter }}"
        validate_certs: false
      register: snapshots_info

    - name: Initialize filtered snapshot list
      ansible.builtin.set_fact:
        filtered_snapshots: []

    - name: Filter snapshots older than threshold
      ansible.builtin.set_fact:
        filtered_snapshots: "{{ filtered_snapshots + [item] }}"
      loop: "{{ snapshots_info.vmware_all_snapshots_info | default([]) }}"
      when:
        - item.creation_time is defined
        - (item.creation_time | to_datetime).timestamp() | int < threshold_epoch

    - name: Generate HTML table rows
      ansible.builtin.set_fact:
        html_table_rows: |
          {% if filtered_snapshots | length > 0 %}
          {% for snapshot in filtered_snapshots %}
          <tr>
            <td>{{ snapshot.name }} (VM: {{ snapshot.vm_name }})</td>
            <td>
              {{ (snapshot.creation_time | to_datetime).strftime('%Y-%m-%d %H:%M:%S') }}
            </td>
            <td>N/A</td>
          </tr>
          {% endfor %}
          {% else %}
          <tr>
            <td colspan="3">
              No snapshots older than {{ days_threshold }} days were found.
            </td>
          </tr>
          {% endif %}

    - name: Construct HTML email body
      ansible.builtin.set_fact:
        email_body_html: |
          <html>
          <head>
            <style>
              body {
                font-family: Arial, sans-serif;
              }

              table {
                width: 80%;
                border-collapse: collapse;
                margin-bottom: 20px;
              }

              th, td {
                border: 1px solid #c0c0c0;
                padding: 10px;
                text-align: left;
              }

              th {
                background-color: #f2f2f2;
                color: #333333;
              }

              .note {
                color: #800000;
                font-weight: bold;
              }
            </style>
          </head>
          <body>

            <h2>{{ email_subject }}</h2>

            <p>
              This report lists all snapshots in datacenter
              <strong>{{ datacenter }}</strong>
              older than
              <strong>{{ days_threshold }}</strong> days.
            </p>

            <p>
              Snapshot creation threshold:
              <strong>{{ readable_threshold_date }}</strong>
            </p>

            <table>
              <tr>
                <th>Name (VM Name)</th>
                <th>Created At</th>
                <th>Size</th>
              </tr>

              {{ html_table_rows }}

            </table>

            <p class="note">Note about snapshot size:</p>

            <p>
              The exact snapshot size (delta disk size) is not returned by
              the <code>vmware_all_snapshots_info</code> module.
            </p>

            <p>
              Report generated by Ansible.
            </p>

          </body>
          </html>

    - name: Send HTML email report via SMTP
      community.general.mail:
        host: "{{ smtp_server }}"
        port: "{{ smtp_port | default(25) }}"
        subject: "{{ email_subject }}"
        body: "{{ email_body_html }}"
        from: "{{ email_from }}"
        to: "{{ email_to }}"
        subtype: html
        secure: never
      delegate_to: localhost

    - name: Display snapshot count
      ansible.builtin.debug:
        msg: >-
          Found {{ filtered_snapshots | length }}
          snapshots older than {{ days_threshold }} days.
